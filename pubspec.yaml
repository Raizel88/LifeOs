name: lifeos
description: A production-grade application called LifeOS.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.12.2 <4.0.0'

dependencies:
  # Flutter SDK
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^14.2.1

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Networking
  dio: ^5.5.0+1
  supabase_flutter: ^2.5.4

  # Storage
  flutter_secure_storage: ^9.2.2
  hive_ce: ^2.1.2
  hive_ce_flutter: ^2.1.1
  path_provider: ^2.1.3
  shared_preferences: ^2.2.3

  # Localization & Formatting
  intl: ^0.19.0

  # UI & Fonts
  google_fonts: ^6.2.1

  # Utilities
  flutter_dotenv: ^5.1.0
  json_annotation: ^4.9.0
  logger: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  # Code Generation
  build_runner: ^2.4.11
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.2

  # Linting
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/fonts/
    - assets/icons/
    - assets/images/
    - assets/animations/
    - assets/lottie/
